name: Generate Iconset JSON

on:
  push:
    paths:
      - 'icon/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate iconset JSONs
        run: |
          python3 << 'EOF'
          import os, json

          repo = "a13609y/1"
          branch = "main"
          icon_root = "icon"
          img_exts = {".png", ".jpg", ".jpeg", ".webp", ".svg"}

          for folder in sorted(os.listdir(icon_root)):
            folder_path = os.path.join(icon_root, folder)
            if not os.path.isdir(folder_path):
              continue

            icons = []
            for fname in sorted(os.listdir(folder_path)):
              if os.path.splitext(fname)[1].lower() in img_exts:
                name = os.path.splitext(fname)[0]
                url = f"https://raw.githubusercontent.com/{repo}/{branch}/{icon_root}/{folder}/{fname}"
                icons.append({"name": name, "url": url})

            if not icons:
              continue

            out = {
              "name": folder,
              "icons": icons
            }

            out_path = os.path.join(icon_root, folder, "iconset.json")
            with open(out_path, "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
            print(f"Generated {out_path} with {len(icons)} icons")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icon/**/iconset.json
          git diff --staged --quiet || git commit -m "Auto-update iconset.json"
          git push
