#!name = YouTube 强制简体中文字幕
#!desc = 将 YouTube 字幕替换为简体中文
#!author = @ZenmoFeiShi (adapted for Surge)
#!version = 1.0

[Script]
# 第一条：拦截自发起的二次请求，剥除 Cookie（request 阶段）
yt-sub-clean = type=http-request, pattern=^https://www\.youtube\.com/api/timedtext\?.*_ytzhsub=1, script-path=js/yt-sub-clean.js, requires-body=0, max-size=0

# 第二条：拦截字幕响应，发起中文字幕请求并替换（response 阶段）
yt-zh-sub = type=http-response, pattern=^https://www\.youtube\.com/api/timedtext\?, script-path=js/yt-zh-sub.js, requires-body=1, max-size=0

[MITM]
hostname = %APPEND% www.youtube.com
