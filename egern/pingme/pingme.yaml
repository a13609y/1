mitm:
  hostnames:
    includes:
      - "api.pingmeapp.net"

scriptings:
  - http_request:
      name: PingMe 抓取参数
      match: "^https://api\\.pingmeapp\\.net/app/(queryBalanceAndBonus|checkIn)"
      script_url: "https://raw.githubusercontent.com/a13609y/1/refs/heads/main/egern/pingme/Pingmecapture.js"
      timeout: 30

  - schedule:
      name: PingMe 签到
      cron: "30 8,20 * * *"
      script_url: "https://你的托管地址/PingMeSignin.js"
      timeout: 30
